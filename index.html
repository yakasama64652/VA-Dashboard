<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAVA Automation | Supabase Synced</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --dark: #1e293b; --accent: #10b981; --danger: #ef4444; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--dark); min-height: 100vh; }
        
        /* Auth Screens */
        #auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--dark); }
        .auth-card { background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .auth-card img { max-height: 80px; margin-bottom: 20px; }
        .auth-card input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .auth-card h2 { margin-bottom: 20px; color: var(--dark); font-size: 1.2rem; }
        .toggle-link { color: var(--primary); cursor: pointer; font-size: 0.85rem; margin-top: 15px; display: block; }

        /* Dashboard Wrapper */
        #dashboard-wrapper { display: none; }
        .main-layout { display: flex; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--dark); color: white; padding: 30px 20px; position: fixed; height: 100vh; box-sizing: border-box; z-index: 10; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .brand-logo { width: auto; max-width: 80%; max-height: 80px; margin-bottom: 15px; object-fit: contain; }
        .sidebar h2 { font-size: 1.1rem; margin: 0 0 5px 0; color: var(--primary); letter-spacing: 1px; text-transform: uppercase; }
        .va-role-tag { font-size: 0.85rem; color: #94a3b8; margin-bottom: 30px; display: block; font-style: italic; }
        .nav-container { width: 100%; text-align: left; flex-grow: 1; }
        .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: 0.3s; margin-bottom: 5px; width: 100%; box-sizing: border-box; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--primary); }
        .logout-btn { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); margin-top: auto; }

        /* Main UI */
        .main-content { margin-left: 280px; padding: 40px; width: 100%; max-width: 1000px; }
        .card { background: white; padding: 25px; border-radius: 16px; margin-bottom: 25px; border: 1px solid #e2e8f0; position: relative; }
        .profile-grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .profile-header { display: flex; align-items: center; gap: 20px; text-align: left; }
        #profile-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); background: #eee;}
        .photo-controls { display: none; margin-top: 5px; gap: 3px; justify-content: center;}
        .photo-btn { font-size: 10px; padding: 2px 6px; cursor: pointer; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 4px;}
        .editing .photo-controls { display: flex; }
        .editable-input { display: none; width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;}
        .editing .editable-input { display: block; }
        .editing .static-text { display: none; }
        .edit-btn { position: absolute; top: 20px; right: 20px; background: #f1f5f9; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; z-index: 5;}

        /* Leave Credits */
        .leave-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .leave-stat { background: #f1f5f9; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #e2e8f0; }
        .leave-stat label { font-size: 0.7rem; font-weight: 800; color: #64748b; display: block; margin-bottom: 5px; }
        .leave-stat span { font-size: 1.4rem; font-weight: 800; color: var(--dark); }
        .leave-btns { margin-top: 8px; display: flex; justify-content: center; gap: 5px; }
        .leave-btns button { padding: 2px 8px; font-size: 0.7rem; cursor: pointer; border-radius: 4px; border: 1px solid #cbd5e1; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal-bubble { background: white; padding: 30px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-prime { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; }
        .task-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #f8fafc; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid var(--primary); text-align: left; }
        .task-item.completed { opacity: 0.5; text-decoration: line-through; }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-card" id="login-card">
        <img src="https://raw.githubusercontent.com/yakasama64652/PTO/main/kling_20260422_VIDEO__1217_0.png" alt="LAVA Logo">
        <h2>LAVA Login</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-pass" placeholder="Password">
        <button class="btn-prime" onclick="handleLogin()">Login</button>
        <span class="toggle-link" onclick="toggleAuth(false)">New account</span>
    </div>

    <div class="auth-card" id="signup-card" style="display:none;">
        <img src="https://raw.githubusercontent.com/yakasama64652/PTO/main/kling_20260422_VIDEO__1217_0.png" alt="LAVA Logo">
        <h2>LAVA Signup</h2>
        <input type="email" id="reg-email" placeholder="Email">
        <input type="password" id="reg-pass" placeholder="Password">
        <button class="btn-prime" onclick="handleSignup()">Sign Up</button>
        <span class="toggle-link" onclick="toggleAuth(true)">Back to Login</span>
    </div>
</div>

<div id="dashboard-wrapper">
    <div class="main-layout">
        <div class="sidebar">
            <img src="https://raw.githubusercontent.com/yakasama64652/PTO/main/kling_20260422_VIDEO__1217_0.png" alt="LAVA Logo" class="brand-logo">
            <h2>LAVA Automation</h2>
            <div id="side-name" style="font-weight: bold; margin-top: 10px;">User Name</div>
            <div id="side-role" class="va-role-tag">Loading...</div>
            <div class="nav-container">
                <div class="nav-item">Dashboard</div>
                <div class="nav-item">SOP Vault</div>
                <div class="nav-item">Reports</div>
            </div>
            <div class="nav-item logout-btn" onclick="handleLogout()">Logout</div>
        </div>

        <div class="main-content">
            <div class="profile-grid">
                <div class="card" id="profile-card">
                    <button class="edit-btn" onclick="toggleEdit()">Edit Profile</button>
                    <div class="profile-header">
                        <div class="photo-area">
                            <img id="profile-img" src="https://via.placeholder.com/100?text=VA" alt="Profile">
                            <div class="photo-controls">
                                <input type="file" id="file-input" style="display:none" onchange="handlePhotoUpload(event)" accept="image/*">
                                <button class="photo-btn" onclick="document.getElementById('file-input').click()">Up</button>
                                <button class="photo-btn" onclick="deletePhoto()" style="color:var(--danger)">Del</button>
                            </div>
                        </div>
                        <div style="flex:1;">
                            <h1 class="static-text" id="display-name" style="margin:0; font-size: 1.5rem;">Alex Rivera</h1>
                            <input type="text" class="editable-input" id="edit-name">
                            <div class="static-text" style="color: #64748b;" id="display-role">General Virtual Assistant</div>
                            <input type="text" class="editable-input" id="edit-role">
                            <div class="static-text" style="font-size: 0.9rem; margin-top: 5px;">Agency: <b id="display-agency">Blue Horizon</b></div>
                            <input type="text" class="editable-input" id="edit-agency">
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3 style="margin-top:0; font-size: 1rem;">Leave Credits</h3>
                    <div class="leave-container">
                        <div class="leave-stat"><label>PTO</label><span id="pto-val">0</span>
                            <div class="leave-btns"><button onclick="updateLeave('pto', 1)">+</button><button onclick="updateLeave('pto', -1)">-</button></div>
                        </div>
                        <div class="leave-stat"><label>SICK</label><span id="sick-val">0</span>
                            <div class="leave-btns"><button onclick="updateLeave('sick', 1)">+</button><button onclick="updateLeave('sick', -1)">-</button></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Task List</h3>
                <div style="display:flex; gap: 10px; margin-bottom: 20px;">
                    <input type="text" id="task-input" placeholder="What's the goal for today?" style="flex:1; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <button onclick="addTask()" class="btn-prime" style="width: auto;">Add Task</button>
                </div>
                <div id="task-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 1. CONFIG SUPABASE ---
    const _supabase = supabase.createClient('https://esjxzcmfxtestkettdyp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzanh6Y21meHRlc3RrZXR0ZHlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNTQ3MzksImV4cCI6MjA5MzczMDczOX0.G9i7nrGVzD8WrKFg7642HvRs9GeTPgkRMuFw8vQ-6C0');

    let currentUser = null;
    let data = { profile: { name: "", role: "", agency: "", pto: 0, sick: 0, photo: "" }, tasks: [] };

    // --- 2. AUTH LOGIC ---
    async function handleSignup() {
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-pass').value;
        const { error } = await _supabase.auth.signUp({ email, password });
        if (error) alert(error.message); else alert("Check email for verification!");
    }

    async function handleLogin() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-pass').value;
        const { data: authData, error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) alert(error.message); else checkSession();
    }

    async function handleLogout() {
        await _supabase.auth.signOut();
        checkSession();
    }

    function toggleAuth(isLogin) {
        document.getElementById('login-card').style.display = isLogin ? 'block' : 'none';
        document.getElementById('signup-card').style.display = isLogin ? 'none' : 'block';
    }

    // --- 3. SYNC LOGIC ---
    async function checkSession() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            currentUser = session.user;
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('dashboard-wrapper').style.display = 'block';
            await loadUserData();
        } else {
            currentUser = null;
            document.getElementById('auth-container').style.display = 'flex';
            document.getElementById('dashboard-wrapper').style.display = 'none';
        }
    }

    async function loadUserData() {
        const { data: dbData, error } = await _supabase
            .from('va_data')
            .select('*')
            .eq('user_id', currentUser.id)
            .single();

        if (dbData) {
            data.profile = dbData.profile_data;
            data.tasks = dbData.tasks_data;
            renderAll();
        } else {
            // New user, create empty row
            await saveToSupabase();
        }
    }

    async function saveToSupabase() {
        const { error } = await _supabase
            .from('va_data')
            .upsert({ 
                user_id: currentUser.id, 
                profile_data: data.profile, 
                tasks_data: data.tasks,
                updated_at: new Date()
            }, { onConflict: 'user_id' });
        
        if (error) console.error("Sync Error:", error);
        renderAll();
    }

    // --- 4. DASHBOARD ACTIONS (REPLACED saveData) ---
    function renderAll() {
        document.getElementById('display-name').innerText = data.profile.name || "Set Name";
        document.getElementById('side-name').innerText = data.profile.name || "User";
        document.getElementById('display-role').innerText = data.profile.role || "Set Role";
        document.getElementById('side-role').innerText = data.profile.role || "";
        document.getElementById('display-agency').innerText = data.profile.agency || "Set Agency";
        document.getElementById('profile-img').src = data.profile.photo || "https://via.placeholder.com/100?text=VA";
        document.getElementById('pto-val').innerText = data.profile.pto;
        document.getElementById('sick-val').innerText = data.profile.sick;
        renderTasks();
    }

    function renderTasks() {
        document.getElementById('task-list').innerHTML = data.tasks.map((t, i) => `
            <div class="task-item ${t.done ? 'completed' : ''}">
                <span onclick="toggleTask(${i})" style="cursor:pointer; flex:1">${t.text}</span>
                <span onclick="deleteTask(${i})" style="color:var(--danger); cursor:pointer;">✕</span>
            </div>
        `).join('');
    }

    // Wrap these existing functions to call saveToSupabase()
    function updateLeave(type, amt) { data.profile[type] += amt; saveToSupabase(); }
    function addTask() {
        const val = document.getElementById('task-input').value;
        if (!val) return;
        data.tasks.push({ text: val, done: false });
        document.getElementById('task-input').value = "";
        saveToSupabase();
    }
    function toggleTask(i) { data.tasks[i].done = !data.tasks[i].done; saveToSupabase(); }
    function deleteTask(i) { data.tasks.splice(i, 1); saveToSupabase(); }
    
    function toggleEdit() {
        const card = document.getElementById('profile-card');
        const isEditing = card.classList.toggle('editing');
        if (!isEditing) {
            data.profile.name = document.getElementById('edit-name').value;
            data.profile.role = document.getElementById('edit-role').value;
            data.profile.agency = document.getElementById('edit-agency').value;
            saveToSupabase();
        } else {
            document.getElementById('edit-name').value = data.profile.name;
            document.getElementById('edit-role').value = data.profile.role;
            document.getElementById('edit-agency').value = data.profile.agency;
        }
    }

    // Photo logic 
    function handlePhotoUpload(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            data.profile.photo = e.target.result;
            saveToSupabase();
        };
        reader.readAsDataURL(file);
    }

    // Initial Start
    checkSession();
</script>

</body>
</html>
