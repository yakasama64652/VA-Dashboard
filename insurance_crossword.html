<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&C Insurance Crossword</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #fff7ec;
            --paper: #ffffff;
            --ink: #2a2350;
            --ink-soft: #6b6394;
            --coral: #ff5a6e;
            --coral-deep: #e8384f;
            --sun: #ffce3a;
            --teal: #14c8a6;
            --grape: #7b5cff;
            --tray: #efe6ff;
            --cell-bg: #ffffff;
            --cell-active: #ffe27a;
            --cell-correct: #22c55e;
            --cell-wrong: #ff4d5e;
            --line: #2a2350;
            --cell-size: 46px;
            --font-head: 'Fredoka', sans-serif;
            --font-body: 'Nunito', sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(55% 45% at 12% 8%, rgba(123, 92, 255, 0.18), transparent 60%),
                radial-gradient(50% 45% at 90% 12%, rgba(255, 206, 58, 0.25), transparent 60%),
                radial-gradient(60% 55% at 80% 95%, rgba(20, 200, 166, 0.18), transparent 60%),
                linear-gradient(160deg, var(--cream), #ffeede);
            color: var(--ink);
            margin: 0;
            padding: 28px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Floating decorative shapes */
        .bg-decor { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .blob { position: absolute; opacity: 0.5; animation: float 9s ease-in-out infinite; }
        .blob.b1 { top: 14%; left: 6%; font-size: 2.4rem; animation-delay: 0s; }
        .blob.b2 { top: 22%; right: 8%; font-size: 2rem; animation-delay: 1.2s; }
        .blob.b3 { bottom: 16%; left: 10%; font-size: 2.2rem; animation-delay: 2.1s; }
        .blob.b4 { bottom: 22%; right: 12%; font-size: 1.8rem; animation-delay: 0.7s; }
        .blob.b5 { top: 48%; left: 3%; font-size: 1.6rem; animation-delay: 1.8s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-6deg); }
            50% { transform: translateY(-16px) rotate(8deg); }
        }

        header {
            text-align: center;
            margin-bottom: 26px;
            position: relative;
            z-index: 1;
        }

        h1 {
            margin: 0;
            font-family: var(--font-head);
            font-weight: 700;
            font-size: clamp(2.2rem, 6vw, 3.2rem);
            line-height: 1;
            color: var(--ink);
            letter-spacing: -0.5px;
            text-shadow: 3px 3px 0 var(--sun), 6px 6px 0 rgba(123, 92, 255, 0.25);
        }
        h1 .accent { color: var(--coral); }

        p.subtitle {
            color: var(--ink-soft);
            margin-top: 12px;
            font-weight: 700;
            font-size: 1.05rem;
        }
        p.subtitle .pill {
            display: inline-block;
            background: var(--paper);
            border: 2px solid var(--ink);
            border-radius: 999px;
            padding: 3px 14px;
            box-shadow: 2px 2px 0 var(--ink);
        }

        .game-container {
            display: flex;
            gap: 36px;
            max-width: 1100px;
            width: 100%;
            background: var(--paper);
            padding: 32px;
            border-radius: 28px;
            border: 3px solid var(--ink);
            box-shadow: 10px 10px 0 rgba(42, 35, 80, 0.85);
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        /* Crossword Grid */
        .grid-container { position: relative; }

        .crossword-grid {
            display: grid;
            grid-template-columns: repeat(11, var(--cell-size));
            grid-template-rows: repeat(11, var(--cell-size));
            gap: 5px;
            background: linear-gradient(160deg, var(--tray), #e4d8ff);
            padding: 12px;
            border-radius: 18px;
            border: 3px solid var(--ink);
            box-shadow: inset 0 3px 10px rgba(123, 92, 255, 0.25), 5px 5px 0 rgba(42, 35, 80, 0.18);
        }

        .cell {
            position: relative;
            width: var(--cell-size);
            height: var(--cell-size);
            background-color: var(--cell-bg);
            border: 2px solid rgba(42, 35, 80, 0.18);
            border-radius: 9px;
            transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
            box-shadow: 0 2px 0 rgba(42, 35, 80, 0.12);
        }

        .cell.wall {
            background-color: transparent;
            border-color: transparent;
            box-shadow: none;
        }

        .cell input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            text-align: center;
            font-family: var(--font-head);
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--ink);
            text-transform: uppercase;
            caret-color: var(--coral);
            border-radius: 7px;
            padding: 0;
        }

        .cell:not(.wall):hover {
            transform: translateY(-2px);
            border-color: var(--grape);
        }

        .cell input:focus {
            outline: none;
            background-color: var(--cell-active);
            box-shadow: 0 0 0 3px var(--sun);
        }
        .cell:has(input:focus) {
            transform: translateY(-2px) scale(1.04);
            border-color: var(--sun);
            z-index: 5;
        }

        .cell .number {
            position: absolute;
            top: 2px;
            left: 5px;
            font-family: var(--font-head);
            font-size: 0.62rem;
            font-weight: 600;
            color: var(--coral);
            pointer-events: none;
            z-index: 2;
        }

        /* Dynamic Feedback Classes */
        .cell.correct-flash {
            border-color: var(--cell-correct);
            animation: pop 0.3s ease;
        }
        .cell.correct-flash input {
            background-color: var(--cell-correct) !important;
            color: #fff;
        }
        .cell.wrong-flash {
            border-color: var(--cell-wrong);
            animation: shake 0.35s ease;
        }
        .cell.wrong-flash input {
            background-color: var(--cell-wrong) !important;
            color: #fff;
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.18); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* Clues Panel */
        .clues-container {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .clue-section {
            background: var(--cream);
            padding: 18px 22px;
            border-radius: 18px;
            border: 3px solid var(--ink);
            box-shadow: 5px 5px 0 rgba(42, 35, 80, 0.16);
        }
        .clue-section:nth-of-type(1) { border-left: 10px solid var(--coral); }
        .clue-section:nth-of-type(2) { border-left: 10px solid var(--teal); }

        .clue-section h2 {
            margin: 0 0 12px;
            font-family: var(--font-head);
            font-weight: 600;
            font-size: 1.4rem;
            color: var(--ink);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clue-list { list-style: none; padding: 0; margin: 0; }

        .clue-item {
            margin-bottom: 8px;
            padding: 9px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
            font-size: 0.96rem;
            font-weight: 600;
            line-height: 1.45;
            border: 2px solid transparent;
        }
        .clue-item:hover {
            background: var(--paper);
            border-color: var(--ink);
            transform: translateX(6px);
            box-shadow: 3px 3px 0 var(--grape);
        }
        .clue-item strong {
            color: var(--coral);
            margin-right: 5px;
            font-family: var(--font-head);
            font-weight: 600;
        }
        .clue-item em { color: var(--ink-soft); font-weight: 700; font-style: normal; font-size: 0.82rem; }

        /* Toolbar Actions */
        .toolbar {
            display: flex;
            gap: 15px;
            margin-top: 14px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            font-family: var(--font-head);
            background-color: var(--coral);
            color: #fff;
            border: 3px solid var(--ink);
            padding: 13px 26px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            box-shadow: 0 5px 0 var(--ink);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 7px 0 var(--ink); }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--ink); }

        button.secondary {
            background-color: var(--paper);
            color: var(--ink);
        }
        #btn-reveal { background-color: var(--sun); color: var(--ink); }
        #btn-reset { background-color: var(--teal); color: #fff; }

        #win-message {
            display: none;
            margin-top: 22px;
            padding: 20px 26px;
            width: 100%;
            background: linear-gradient(120deg, var(--teal), var(--grape));
            color: #fff;
            font-family: var(--font-head);
            font-weight: 700;
            border: 3px solid var(--ink);
            border-radius: 18px;
            text-align: center;
            font-size: 1.4rem;
            box-shadow: 6px 6px 0 var(--ink);
            position: relative;
            animation: bounce 0.6s ease infinite alternate;
        }
        #win-message::before, #win-message::after {
            content: "🎊";
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.6rem;
            animation: spark 1s ease infinite alternate;
        }
        #win-message::before { left: 18px; }
        #win-message::after { right: 18px; }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-7px); }
        }
        @keyframes spark {
            from { transform: translateY(-50%) scale(1) rotate(-8deg); }
            to { transform: translateY(-50%) scale(1.25) rotate(8deg); }
        }

        @media (max-width: 600px) {
            :root { --cell-size: 30px; }
            .game-container { padding: 20px; gap: 24px; }
            .cell input { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <div class="bg-decor" aria-hidden="true">
        <span class="blob b1">✏️</span>
        <span class="blob b2">🧩</span>
        <span class="blob b3">🛡️</span>
        <span class="blob b4">⭐</span>
        <span class="blob b5">💡</span>
    </div>

    <header>
        <h1>P&amp;C Insurance <span class="accent">Crossword</span> 🧩</h1>
        <p class="subtitle"><span class="pill">Test your Property &amp; Casualty insurance knowledge!</span></p>
    </header>

    <div class="game-container">
        <div class="grid-container">
            <div class="crossword-grid" id="grid"></div>
        </div>

        <div class="clues-container">
            <div class="clue-section">
                <h2>➡️ Across</h2>
                <ul class="clue-list" id="across-clues"></ul>
            </div>
            <div class="clue-section">
                <h2>⬇️ Down</h2>
                <ul class="clue-list" id="down-clues"></ul>
            </div>
        </div>

        <div class="toolbar">
            <button id="btn-check">✓ Check Answers</button>
            <button id="btn-reveal" class="secondary">💡 Reveal Letters</button>
            <button id="btn-reset" class="secondary">↺ Reset</button>
        </div>
        
        <div id="win-message">🎉 Congratulations! You solved the crossword flawlessly!</div>
    </div>

    <script>
        // Layout schema mapping directly to your provided text design. Row-indexed matrix layout.
        const gridLayout = [
            ['.', '.', '.', 'P', 'O', 'L', 'I', 'C', 'Y', '.', '.'],
            ['.', '.', '.', 'R', '.', '.', '.', 'L', '.', '.', '.'],
            ['F', 'I', 'R', 'E', '.', '.', '.', 'A', 'U', 'T', 'O'],
            ['.', '.', '.', 'M', '.', '.', '.', 'I', '.', '.', '.'],
            ['.', '.', 'R', 'I', 'S', 'K', '.', 'M', '.', '.', '.'],
            ['.', '.', '.', 'U', '.', '.', '.', '.', 'A', '.', '.'],
            ['.', 'A', '.', 'M', '.', 'D', 'E', 'D', 'U', 'C', 'T'],
            ['.', 'G', '.', '.', '.', '.', '.', '.', 'T', '.', '.'],
            ['P', 'E', 'R', 'I', 'L', '.', '.', '.', 'O', '.', '.'],
            ['.', 'N', '.', '.', '.', '.', '.', '.', '.', '.', '.'],
            ['.', 'T', '.', '.', '.', '.', '.', '.', '.', '.', '.']
        ];

        // Words schema. Clue numbers are NOT hardcoded — they are computed from the
        // grid (see computeNumbering) so the box labels and clue list always match.
        const clues = [
            { dir: 'across', word: 'POLICY', row: 0, col: 3, text: 'A legal contract between the insurer and the insured.' },
            { dir: 'across', word: 'FIRE', row: 2, col: 0, text: 'A core property hazard covered under standard commercial/homeowners policies.' },
            { dir: 'across', word: 'AUTO', row: 2, col: 7, text: 'A major personal insurance line covering private passenger vehicles.' },
            { dir: 'across', word: 'RISK', row: 4, col: 2, text: 'The probability or threat of quantifiable damage, injury, liability, or loss.' },
            { dir: 'across', word: 'DEDUCT', row: 6, col: 5, text: 'Short for deductible; amount paid out-of-pocket before insurance kicks in.' },
            { dir: 'across', word: 'PERIL', row: 8, col: 0, text: 'A specific cause of loss, such as theft, windstorm, or flood.' },

            { dir: 'down', word: 'PREMIUM', row: 0, col: 3, text: 'The amount of money an individual or business pays for an insurance policy.' },
            { dir: 'down', word: 'CLAIM', row: 0, col: 7, text: 'A formal request by a policyholder for coverage or compensation.' },
            { dir: 'down', word: 'AUTO', row: 5, col: 8, text: 'Coverage line for private passenger vehicles (reading downward).' },
            { dir: 'down', word: 'AGENT', row: 6, col: 1, text: 'A person authorized to act on behalf of an insurance company to sell policies.' }
        ];

        const rows = 11;
        const cols = 11;
        const gridEl = document.getElementById('grid');

        // Standard crossword numbering: scan top-to-bottom, left-to-right and number any
        // cell that begins an across word and/or a down word. This guarantees the numbers
        // in the boxes are always sequential and correctly placed.
        function computeNumbering() {
            const map = {};
            let n = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (gridLayout[r][c] === '.') continue;
                    const startsAcross = (c === 0 || gridLayout[r][c - 1] === '.') &&
                                         (c + 1 < cols && gridLayout[r][c + 1] !== '.');
                    const startsDown = (r === 0 || gridLayout[r - 1][c] === '.') &&
                                       (r + 1 < rows && gridLayout[r + 1][c] !== '.');
                    if (startsAcross || startsDown) {
                        n++;
                        map[`${r}-${c}`] = n;
                    }
                }
            }
            return map;
        }

        const numberMap = computeNumbering();
        // Attach the computed number to each clue based on its starting cell.
        clues.forEach(c => { c.num = numberMap[`${c.row}-${c.col}`]; });

        // Render Clue Lists (sorted by their computed number)
        function renderClues() {
            const acrossList = document.getElementById('across-clues');
            const downList = document.getElementById('down-clues');

            [...clues].sort((a, b) => a.num - b.num).forEach(c => {
                const li = document.createElement('li');
                li.className = 'clue-item';
                li.innerHTML = `<strong>${c.num}.</strong> ${c.text} <em>(${c.word.length} letters)</em>`;
                li.addEventListener('click', () => {
                    const targetInput = document.querySelector(`[data-row="${c.row}"][data-col="${c.col}"] input`);
                    if(targetInput) targetInput.focus();
                });
                if(c.dir === 'across') acrossList.appendChild(li);
                else downList.appendChild(li);
            });
        }

        // Initialize Crossword Grid Space
        function createGrid() {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    if (gridLayout[r][c] === '.') {
                        cell.classList.add('wall');
                    } else {
                        // Insert number assignments if available
                        if (numberMap[`${r}-${c}`]) {
                            const numLabel = document.createElement('span');
                            numLabel.className = 'number';
                            numLabel.innerText = numberMap[`${r}-${c}`];
                            cell.appendChild(numLabel);
                        }

                        // Text Character Input Layer Config
                        const input = document.createElement('input');
                        input.setAttribute('maxlength', '1');
                        input.dataset.answer = gridLayout[r][c];
                        
                        // Behavior events mapping handles instant focus transfers
                        input.addEventListener('input', (e) => {
                            if (e.target.value.length === 1) {
                                moveFocus(r, c, 1);
                            }
                        });

                        input.addEventListener('keydown', (e) => {
                            if (e.key === 'Backspace' && e.target.value === '') {
                                moveFocus(r, c, -1);
                            }
                        });

                        cell.appendChild(input);
                    }
                    gridEl.appendChild(cell);
                }
            }
        }

        // Smart dynamic cursor routing mechanics
        function moveFocus(r, col, step) {
            // Prefers checking rightwards inline grid vectors first, falling back to downwards check paths
            let nextCol = col + step;
            let nextRow = r;
            
            if (nextCol >= 0 && nextCol < cols && gridLayout[r][nextCol] !== '.') {
                const nextInput = document.querySelector(`[data-row="${r}"][data-col="${nextCol}"] input`);
                if(nextInput) return nextInput.focus();
            }

            let nextRowStep = r + step;
            if (nextRowStep >= 0 && nextRowStep < rows && gridLayout[nextRowStep][col] !== '.') {
                const nextInput = document.querySelector(`[data-row="${nextRowStep}"][data-col="${col}"] input`);
                if(nextInput) nextInput.focus();
            }
        }

        // Action Handlers
        document.getElementById('btn-check').addEventListener('click', () => {
            const inputs = document.querySelectorAll('.cell:not(.wall) input');
            let allCorrect = true;

            inputs.forEach(input => {
                const p = input.parentElement;
                if (input.value.toUpperCase() === input.dataset.answer) {
                    p.classList.add('correct-flash');
                    p.classList.remove('wrong-flash');
                } else {
                    if(input.value !== "") {
                        p.classList.add('wrong-flash');
                        allCorrect = false;
                    }
                    p.classList.remove('correct-flash');
                }
            });

            if (allCorrect && Array.from(inputs).every(i => i.value !== "")) {
                document.getElementById('win-message').style.display = 'block';
            }
        });

        document.getElementById('btn-reveal').addEventListener('click', () => {
            const inputs = document.querySelectorAll('.cell:not(.wall) input');
            inputs.forEach(input => {
                input.value = input.dataset.answer;
                input.parentElement.classList.remove('wrong-flash');
                input.parentElement.classList.add('correct-flash');
            });
            document.getElementById('win-message').style.display = 'block';
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            const inputs = document.querySelectorAll('.cell:not(.wall) input');
            inputs.forEach(input => {
                input.value = '';
                input.parentElement.classList.remove('correct-flash', 'wrong-flash');
            });
            document.getElementById('win-message').style.display = 'none';
        });

        // Initialize App Execution Entry Points
        createGrid();
        renderClues();
    </script>
</body>
</html>
