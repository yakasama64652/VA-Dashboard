<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&C Insurance Crossword</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --cell-bg: #334155;
            --cell-active: #0284c7;
            --cell-correct: #22c55e;
            --cell-wrong: #ef4444;
            --wall-bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        p.subtitle {
            color: var(--text-muted);
            margin-top: 5px;
        }

        .game-container {
            display: flex;
            gap: 40px;
            max-width: 1100px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Crossword Grid */
        .grid-container {
            position: relative;
        }

        .crossword-grid {
            display: grid;
            grid-template-columns: repeat(11, 45px);
            grid-template-rows: repeat(11, 45px);
            gap: 4px;
            background-color: var(--wall-bg);
            padding: 8px;
            border-radius: 12px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .cell {
            position: relative;
            width: 45px;
            height: 45px;
            background-color: var(--cell-bg);
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .cell.wall {
            background-color: transparent;
        }

        .cell input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            caret-color: var(--accent);
        }

        .cell input:focus {
            outline: none;
            background-color: var(--cell-active);
            border-radius: 6px;
            box-shadow: 0 0 12px var(--accent);
        }

        .cell .number {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 0.65rem;
            font-weight: bold;
            color: var(--accent);
            pointer-events: none;
        }

        /* Dynamic Feedback Classes */
        .cell.correct-flash input {
            background-color: var(--cell-correct) !important;
        }
        .cell.wrong-flash input {
            background-color: var(--cell-wrong) !important;
        }

        /* Clues Panel */
        .clues-container {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .clue-section {
            background: rgba(15, 23, 42, 0.4);
            padding: 15px 20px;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }

        .clue-section h2 {
            margin-top: 0;
            font-size: 1.3rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .clue-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .clue-item {
            margin-bottom: 10px;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .clue-item:hover {
            background: rgba(56, 189, 248, 0.1);
        }

        .clue-item strong {
            color: var(--accent);
            margin-right: 5px;
        }

        /* Toolbar Actions */
        .toolbar {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            width: 100%;
            justify-content: center;
        }

        button {
            background-color: var(--accent);
            color: var(--bg-color);
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        button.secondary {
            background-color: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            box-shadow: none;
        }

        button.secondary:hover {
            background-color: rgba(56, 189, 248, 0.1);
        }

        #win-message {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: var(--cell-correct);
            color: white;
            font-weight: bold;
            border-radius: 8px;
            text-align: center;
            font-size: 1.2rem;
            animation: bounce 0.5s ease infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <header>
        <h1>P&C Insurance Crossword</h1>
        <p class="subtitle">Test your Property & Casualty insurance knowledge!</p>
    </header>

    <div class="game-container">
        <div class="grid-container">
            <div class="crossword-grid" id="grid"></div>
        </div>

        <div class="clues-container">
            <div class="clue-section">
                <h2>Across</h2>
                <ul class="clue-list" id="across-clues"></ul>
            </div>
            <div class="clue-section">
                <h2>Down</h2>
                <ul class="clue-list" id="down-clues"></ul>
            </div>
        </div>

        <div class="toolbar">
            <button id="btn-check">Check Answers</button>
            <button id="btn-reveal" class="secondary">Reveal Letters</button>
            <button id="btn-reset" class="secondary">Reset</button>
        </div>
        
        <div id="win-message">🎉 Congratulations! You solved the crossword flawlessly!</div>
    </div>

    <script>
        // Layout schema mapping directly to your provided text design. Row-indexed matrix layout.
        const gridLayout = [
            ['.', '.', '.', 'P', 'O', 'L', 'I', 'C', 'Y', '.', '.'],
            ['.', '.', '.', 'R', '.', '.', '.', 'L', '.', '.', '.'],
            ['F', 'I', 'R', 'E', '.', '.', '.', 'A', 'U', 'T', 'O'],
            ['.', '.', '.', 'M', '.', '.', '.', 'I', '.', '.', '.'],
            ['.', '.', 'R', 'I', 'S', 'K', '.', 'M', '.', '.', '.'],
            ['.', '.', '.', 'U', '.', '.', '.', '.', 'A', '.', '.'],
            ['.', 'A', '.', 'M', '.', 'D', 'E', 'D', 'U', 'C', 'T'],
            ['.', 'G', '.', '.', '.', '.', '.', '.', 'T', '.', '.'],
            ['P', 'E', 'R', 'I', 'L', '.', '.', '.', 'O', '.', '.'],
            ['.', 'N', '.', '.', '.', '.', '.', '.', '.', '.', '.'],
            ['.', 'T', '.', '.', '.', '.', '.', '.', '.', '.', '.']
        ];

        // Words schema with metadata maps for sequencing navigation
        const clues = [
            { num: 1, dir: 'across', word: 'POLICY', row: 0, col: 3, text: 'A legal contract between the insurer and the insured.' },
            { num: 4, dir: 'across', word: 'FIRE', row: 2, col: 0, text: 'A core property hazard covered under standard commercial/homeowners policies.' },
            { num: 5, dir: 'across', word: 'AUTO', row: 2, col: 7, text: 'A major personal insurance line covering private passenger vehicles.' },
            { num: 6, dir: 'across', word: 'RISK', row: 4, col: 2, text: 'The probability or threat of quantifiable damage, injury, liability, or loss.' },
            { num: 7, dir: 'across', word: 'DEDUCT', row: 6, col: 5, text: 'Short for deductible; amount paid out-of-pocket before insurance kicks in.' },
            { num: 9, dir: 'across', word: 'PERIL', row: 8, col: 0, text: 'A specific cause of loss, such as theft, windstorm, or flood.' },
            
            { num: 1, dir: 'down', word: 'PREMIUM', row: 0, col: 3, text: 'The amount of money an individual or business pays for an insurance policy.' },
            { num: 2, dir: 'down', word: 'CLAIM', row: 0, col: 7, text: 'A formal request by a policyholder for coverage or compensation.' },
            { num: 3, dir: 'down', word: 'LIABLE', row: 2, col: 7, text: 'Legally responsible for damages or injury caused to another party.' },
            { num: 5, dir: 'down', word: 'AUTO', row: 2, col: 8, text: 'A major line of coverage (spans across to form an intersection point).' },
            { num: 8, dir: 'down', word: 'AGENT', row: 6, col: 1, text: 'A person authorized to act on behalf of an insurance company to sell policies.' }
        ];

        const rows = 11;
        const cols = 11;
        const gridEl = document.getElementById('grid');

        // Render Clue Lists
        function renderClues() {
            const acrossList = document.getElementById('across-clues');
            const downList = document.getElementById('down-clues');
            
            clues.forEach(c => {
                const li = document.createElement('li');
                li.className = 'clue-item';
                li.innerHTML = `<strong>${c.num}.</strong> ${c.text} <em>(${c.word.length} letters)</em>`;
                li.addEventListener('click', () => {
                    const targetInput = document.querySelector(`[data-row="${c.row}"][data-col="${c.col}"] input`);
                    if(targetInput) targetInput.focus();
                });
                if(c.dir === 'across') acrossList.appendChild(li);
                else downList.appendChild(li);
            });
        }

        // Initialize Crossword Grid Space
        function createGrid() {
            // Setup Number labels lookup map
            const labels = {};
            clues.forEach(c => {
                labels[`${c.row}-${c.col}`] = c.num;
            });

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    if (gridLayout[r][c] === '.') {
                        cell.classList.add('wall');
                    } else {
                        // Insert number assignments if available
                        if (labels[`${r}-${c}`]) {
                            const numLabel = document.createElement('span');
                            numLabel.className = 'number';
                            numLabel.innerText = labels[`${r}-${c}`];
                            cell.appendChild(numLabel);
                        }

                        // Text Character Input Layer Config
                        const input = document.createElement('input');
                        input.setAttribute('maxlength', '1');
                        input.dataset.answer = gridLayout[r][c];
                        
                        // Behavior events mapping handles instant focus transfers
                        input.addEventListener('input', (e) => {
                            if (e.target.value.length === 1) {
                                moveFocus(r, c, 1);
                            }
                        });

                        input.addEventListener('keydown', (e) => {
                            if (e.key === 'Backspace' && e.target.value === '') {
                                moveFocus(r, c, -1);
                            }
                        });

                        cell.appendChild(input);
                    }
                    gridEl.appendChild(cell);
                }
            }
        }

        // Smart dynamic cursor routing mechanics
        function moveFocus(r, col, step) {
            // Prefers checking rightwards inline grid vectors first, falling back to downwards check paths
            let nextCol = col + step;
            let nextRow = r;
            
            if (nextCol >= 0 && nextCol < cols && gridLayout[r][nextCol] !== '.') {
                const nextInput = document.querySelector(`[data-row="${r}"][data-col="${nextCol}"] input`);
                if(nextInput) return nextInput.focus();
            }

            let nextRowStep = r + step;
            if (nextRowStep >= 0 && nextRowStep < rows && gridLayout[nextRowStep][col] !== '.') {
                const nextInput = document.querySelector(`[data-row="${nextRowStep}"][data-col="${col}"] input`);
                if(nextInput) nextInput.focus();
            }
        }

        // Action Handlers
        document.getElementById('btn-check').addEventListener('click', () => {
            const inputs = document.querySelectorAll('.cell:not(.wall) input');
            let allCorrect = true;

            inputs.forEach(input => {
                const p = input.parentElement;
                if (input.value.toUpperCase() === input.dataset.answer) {
                    p.classList.add('correct-flash');
                    p.classList.remove('wrong-flash');
                } else {
                    if(input.value !== "") {
                        p.classList.add('wrong-flash');
                        allCorrect = false;
                    }
                    p.classList.remove('correct-flash');
                }
            });

            if (allCorrect && Array.from(inputs).every(i => i.value !== "")) {
                document.getElementById('win-message').style.display = 'block';
            }
        });

        document.getElementById('btn-reveal').addEventListener('click', () => {
            const inputs = document.querySelectorAll('.cell:not(.wall) input');
            inputs.forEach(input => {
                input.value = input.dataset.answer;
                input.parentElement.classList.remove('wrong-flash');
                input.parentElement.classList.add('correct-flash');
            });
            document.getElementById('win-message').style.display = 'block';
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            const inputs = document.querySelectorAll('.cell:not(.wall) input');
            inputs.forEach(input => {
                input.value = '';
                input.parentElement.classList.remove('correct-flash', 'wrong-flash');
            });
            document.getElementById('win-message').style.display = 'none';
        });

        // Initialize App Execution Entry Points
        createGrid();
        renderClues();
    </script>
</body>
</html>
