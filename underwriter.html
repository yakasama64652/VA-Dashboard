<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwriter Ledger - Exact Clone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * { box-sizing: border-box; cursor: url('https://cur.cursors-4u.net/games/gam-4/gam382.cur'), auto; }

        body {
            background-color: #34495e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'VT323', monospace;
        }

        #game-container {
            width: 800px;
            height: 450px;
            background-color: #e2e2e2;
            border: 8px solid #000;
            position: relative;
            overflow: hidden;
            image-rendering: pixelated;
        }

        /* SCREEN SYSTEM */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #e2e2e2;
            z-index: 1000;
            text-align: center;
        }

        .hidden { display: none !important; }

        /* START SCREEN UI */
        .title-top { font-size: 64px; margin: 0; line-height: 1; }
        .branding { font-size: 24px; color: #eb4d4b; margin-top: 5px; margin-bottom: 40px; }
        
        .pixel-btn {
            background: #000;
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-family: 'VT323', monospace;
            font-size: 32px;
            cursor: pointer;
            box-shadow: 6px 6px 0px #7f8c8d;
        }

        .pixel-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0px #7f8c8d;
        }

        /* HUD & GAMEPLAY (Keep your original styles) */
        .hud-left {
            position: absolute;
            top: 20px;
            left: 25px;
            font-size: 28px;
            line-height: 1;
            z-index: 10;
        }

        .heart-container { margin-top: 5px; }
        .heart { display: inline-block; width: 20px; height: 20px; background: #ff4757; margin-right: 5px; border: 2px solid #000; }
        .heart.empty { background: #57606f; }

        .bucket-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            z-index: 5;
        }

        .bucket-container { text-align: center; font-size: 24px; font-weight: bold; }

        .bucket {
            width: 90px;
            height: 100px;
            border: 4px solid #000;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            box-shadow: inset -6px 0px 0px rgba(0,0,0,0.1);
        }

        .bucket::after {
            content: "";
            position: absolute;
            top: -5px;
            width: 104%;
            height: 15px;
            border: 4px solid #000;
            border-radius: 5px;
            background: inherit;
        }

        .approve { background-color: #6ab04c; }
        .deny { background-color: #eb4d4b; }
        .investigate { background-color: #f9ca24; }

        .icon { width: 40px; height: 40px; border: 3px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: white; font-size: 20px; }

        .conveyor {
            position: absolute;
            bottom: 65px;
            width: 100%;
            height: 60px;
            background: #7f8c8d;
            border-top: 4px solid #000;
            border-bottom: 4px solid #000;
            display: flex;
            align-items: center;
        }

        .roller {
            width: 20px;
            height: 20px;
            border: 3px solid #000;
            border-radius: 50%;
            background: #bdc3c7;
            margin-left: 50px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #active-folder {
            position: absolute;
            left: 50%;
            bottom: 40px;
            transform: translateX(-50%);
            width: 280px;
            height: 190px;
            background: #f7e1ad;
            border: 4px solid #000;
            z-index: 100;
            padding: 15px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1);
        }

        #active-folder::before {
            content: "";
            position: absolute;
            top: -15px;
            left: -4px;
            width: 100px;
            height: 12px;
            background: #f7e1ad;
            border: 4px solid #000;
            border-bottom: none;
        }

        .folder-content h2 { margin: 0; font-size: 26px; border-bottom: 3px solid #000; display: inline-block; margin-bottom: 10px; }
        .folder-content p { margin: 4px 0; font-size: 19px; text-transform: uppercase; line-height: 1.1; font-weight: bold; }

        .bg-folder {
            width: 120px;
            height: 80px;
            background: #d1d1d1;
            border: 2px solid #000;
            position: absolute;
            bottom: 90px;
            opacity: 0.7;
        }

        .footer-text {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 22px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="start-screen" class="screen">
        <h1 class="title-top">UNDERWRITER'S LEDGER</h1>
        <div class="branding">by LAVA Automation</div>
        <button class="pixel-btn" onclick="startGame()">START GAME</button>
    </div>

    <div class="hud-left">
        SCORE:<br>
        <span id="score">0</span><br><br>
        LIVES:<br>
        <div id="lives" class="heart-container">
            <div class="heart"></div><div class="heart"></div><div class="heart"></div>
        </div><br>
        LEVEL:<br>
        1
    </div>

    <div class="bucket-row">
        <div class="bucket-container">
            APPROVE
            <div class="bucket approve" ondrop="handleDrop(event, 'approve')" ondragover="allow(event)">
                <div class="icon">😊</div>
            </div>
        </div>
        <div class="bucket-container">
            DENY
            <div class="bucket deny" ondrop="handleDrop(event, 'deny')" ondragover="allow(event)">
                <div class="icon">🚫</div>
            </div>
        </div>
        <div class="bucket-container">
            INVESTIGATE
            <div class="bucket investigate" ondrop="handleDrop(event, 'investigate')" ondragover="allow(event)">
                <div class="icon">🔍</div>
            </div>
        </div>
    </div>

    <div class="conveyor">
        <div class="roller"></div><div class="roller"></div><div class="roller"></div>
        <div class="roller"></div><div class="roller"></div><div class="roller"></div>
        <div class="roller"></div><div class="roller"></div><div class="roller"></div>
    </div>

    <div class="bg-folder" style="left: 100px;"></div>
    <div class="bg-folder" style="right: 100px;"></div>

    <div id="active-folder" draggable="true" ondragstart="drag(event)">
        <div class="folder-content" id="data"></div>
    </div>

    <div class="footer-text">DRAG TO BIN</div>
</div>

<script>
    let score = 0;
    let lives = 3;

    const deck = [
        { name: "JOHN D.", year: 1955, fault: "1 MILE", claims: 3, factor: "LARGE TREE OVER ROOF", ans: "deny" },
        { name: "MARY L.", year: 1990, fault: "50 MILES", claims: 0, factor: "NO CLAIMS", ans: "approve" },
        { name: "S. ROBERTS", year: 2015, fault: "10 MILES", claims: 1, factor: "MISSING DOCUMENTS", ans: "investigate" },
        { name: "ALEX G.", year: 2022, fault: "100 MILES", claims: 0, factor: "NEW BUILD", ans: "approve" }
    ];

    // Function to hide start screen and begin game
    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        score = 0;
        lives = 3;
        document.getElementById('score').innerText = score;
        updateLives();
        load();
    }

    function load() {
        const r = deck[Math.floor(Math.random() * deck.length)];
        document.getElementById('data').innerHTML = `
            <h2>RISK PROFILE:</h2>
            <p>APPLICANT: ${r.name}</p>
            <p>HOME BUILT: ${r.year}</p>
            <p>DISTANCE TO FAULT LINE: ${r.fault}</p>
            <p>RECENT AUTO CLAIMS: ${r.claims}</p>
            <p>ADDITIONAL FACTOR: ${r.factor}</p>
        `;
        document.getElementById('active-folder').dataset.ans = r.ans;
    }

    function allow(e) { e.preventDefault(); }
    function drag(e) { e.dataTransfer.setData("text", e.target.id); }

    function handleDrop(e, choice) {
        e.preventDefault();
        const ans = document.getElementById('active-folder').dataset.ans;
        if(choice === ans) {
            score += 400;
        } else {
            lives--;
            updateLives();
        }
        document.getElementById('score').innerText = score;
        load();
    }

    function updateLives() {
        const hs = document.querySelectorAll('.heart');
        for(let i=0; i<3; i++) {
            if(i >= lives) hs[i].classList.add('empty');
            else hs[i].classList.remove('empty');
        }
        if(lives <= 0) { 
            alert("GAME OVER! Score: " + score); 
            // Return to start screen
            document.getElementById('start-screen').classList.remove('hidden');
        }
    }

    // Note: load() is now called within startGame()
</script>

</body>
</html>
