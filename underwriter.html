<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwriter Game & Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Your existing styles remain here */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f4f4f9; }
        #game-container { margin: 20px auto; padding: 20px; max-width: 600px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Leaderboard Styles */
        #leaderboard-container { margin-top: 30px; padding: 20px; background: #fff; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #5e6ad2; color: white; }
        .loading-text { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>Underwriter Game</h1>
    <div id="game-ui">
        <p>Score: <span id="score-display">0</span></p>
        <button onclick="endGameMock()">End Game (Simulate Win)</button>
    </div>
</div>

<div id="leaderboard-container">
    <h2>Global Leaderboard</h2>
    <table id="leaderboard-table">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Player</th>
                <th>Score</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body">
            <tr><td colspan="3" class="loading-text">Loading scores...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // --- 1. SUPABASE CONFIGURATION ---
    const SUPABASE_URL = 'https://esjxzcmfxtestkettdyp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzanh6Y21meHRlc3RrZXR0ZHlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNTQ3MzksImV4cCI6MjA5MzczMDczOX0.G9i7nrGVzD8WrKFg7642HvRs9GeTPgkRMuFw8vQ-6C0';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- 2. EXISTING GAME CODE ---
    let currentScore = 0; // Replace with your actual score variable

    // This is a placeholder for your existing logic
    function updateScore(points) {
        currentScore += points;
        document.getElementById('score-display').innerText = currentScore;
    }

    // --- 3. LEADERBOARD LOGIC ---

    // Load leaderboard on page start
    window.onload = fetchLeaderboard;

    async function fetchLeaderboard() {
        const { data, error } = await supabase
            .from('leaderboard')
            .select('player_name, score')
            .order('score', { ascending: false })
            .limit(10);

        if (error) {
            console.error('Error fetching leaderboard:', error);
            return;
        }

        const tableBody = document.getElementById('leaderboard-body');
        tableBody.innerHTML = ''; // Clear loading text

        data.forEach((entry, index) => {
            const row = `<tr>
                <td>${index + 1}</td>
                <td>${entry.player_name}</td>
                <td>${entry.score}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    async function saveScore() {
        const playerName = prompt("Game Over! Enter your name for the leaderboard:", "Anonymous");
        
        if (!playerName) return;

        const { data, error } = await supabase
            .from('leaderboard')
            .insert([{ player_name: playerName, score: currentScore }]);

        if (error) {
            alert('Error saving score. Please check console.');
            console.error(error);
        } else {
            alert('Score saved!');
            fetchLeaderboard(); // Refresh the list
        }
    }

    // Example trigger: call saveScore() when your game logic ends
    function endGameMock() {
        // This simulates your game ending
        updateScore(Math.floor(Math.random() * 100)); // Just for demo
        saveScore();
    }

</script>
</body>
</html>
