<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAVA Games | Underwriter's Ledger</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --bg: #0f172a; --card: #1e293b; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: var(--white); overflow: hidden; }
        
        #game-container { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 500px; text-align: center; border: 2px solid var(--primary); position: relative; }
        
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; font-size: 1.1rem; color: #94a3b8; }
        #timer { color: #ef4444; }

        .case-file { background: #f8fafc; color: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 25px; text-align: left; border-left: 5px solid var(--primary); min-height: 150px; }
        .case-file h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: var(--primary); }
        .case-detail { margin: 5px 0; font-size: 0.95rem; }

        .actions { display: flex; justify-content: space-around; align-items: center; gap: 15px; }
        .action-btn { background: none; border: none; cursor: pointer; transition: transform 0.2s; padding: 0; }
        .action-btn:hover { transform: scale(1.1); }
        .action-btn img { width: 80px; height: 80px; object-fit: contain; }
        .action-btn span { display: block; font-size: 0.75rem; margin-top: 5px; color: #94a3b8; font-weight: bold; text-transform: uppercase; }

        #menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .btn-start { background: var(--primary); color: white; border: none; padding: 15px 40px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-start:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu-overlay">
        <h1 style="color: var(--primary); margin-bottom: 10px;">Underwriter's Ledger</h1>
        <p style="color: #94a3b8; margin-bottom: 30px;">Decide the fate of the applicants.</p>
        <button class="btn-start" onclick="startGame()">Start Session</button>
        <p id="high-score-display" style="margin-top: 20px; font-size: 0.9rem; color: #10b981;"></p>
    </div>

    <div class="stats">
        <span>Score: <span id="score">0</span></span>
        <span id="timer">Time: 30s</span>
    </div>

    <div class="case-file" id="case-display">
        <h2>Applicant File</h2>
        <div id="case-content">
            </div>
    </div>

    <div class="actions">
        <button class="action-btn" onclick="makeDecision('approve')">
            <img src="approved.png" alt="Approve">
            <span>Approve</span>
        </button>
        <button class="action-btn" onclick="makeDecision('investigate')">
            <img src="investigate.png" alt="Investigate">
            <span>Investigate</span>
        </button>
        <button class="action-btn" onclick="makeDecision('deny')">
            <img src="deny.png" alt="Deny">
            <span>Deny</span>
        </button>
    </div>
</div>

<script>
    // --- SUPABASE CONFIG ---
    const _supabaseUrl = 'https://esjxzcmfxtestkettdyp.supabase.co';
    const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzanh6Y21meHRlc3RrZXR0ZHlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNTQ3MzksImV4cCI6MjA5MzczMDczOX0.G9i7nrGVzD8WrKFg7642HvRs9GeTPgkRMuFw8vQ-6C0';
    const _supabase = supabase.createClient(_supabaseUrl, _supabaseKey);

    let score = 0;
    let timeLeft = 30;
    let timer;
    let currentCase = {};
    let isGameRunning = false;
    let vaDataRef = null;

    const cases = [
        { name: "John Doe", age: 28, health: "Excellent", occupation: "Accountant", correct: "approve" },
        { name: "Sarah Smith", age: 45, health: "Minor Issues", occupation: "Driver", correct: "investigate" },
        { name: "Mike Oxmall", age: 72, health: "Critical", occupation: "Retired", correct: "deny" },
        { name: "Linda Blair", age: 33, health: "Good", occupation: "Skydiving Instructor", correct: "investigate" },
        { name: "Rick Grimes", age: 40, health: "Multiple Injuries", occupation: "Sheriff", correct: "investigate" },
        { name: "Jane Foster", age: 25, health: "Perfect", occupation: "Doctor", correct: "approve" },
        { name: "Willie Nelson", age: 88, health: "Smoker", occupation: "Musician", correct: "deny" }
    ];

    async function loadVAData() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) return;
        const { data } = await _supabase.from('va_data').select('*').eq('user_id', session.user.id).single();
        if (data) {
            vaDataRef = data;
            const hs = data.games_data?.underwriter?.highScore || 0;
            document.getElementById('high-score-display').innerText = `Your High Score: ${hs}`;
        }
    }

    function startGame() {
        score = 0;
        timeLeft = 30;
        isGameRunning = true;
        document.getElementById('score').innerText = score;
        document.getElementById('menu-overlay').style.display = 'none';
        nextCase();
        
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = `Time: ${timeLeft}s`;
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    function nextCase() {
        currentCase = cases[Math.floor(Math.random() * cases.length)];
        document.getElementById('case-content').innerHTML = `
            <div class="case-detail"><strong>Name:</strong> ${currentCase.name}</div>
            <div class="case-detail"><strong>Age:</strong> ${currentCase.age}</div>
            <div class="case-detail"><strong>Health:</strong> ${currentCase.health}</div>
            <div class="case-detail"><strong>Occupation:</strong> ${currentCase.occupation}</div>
        `;
    }

    function makeDecision(choice) {
        if (!isGameRunning) return;
        
        if (choice === currentCase.correct) {
            score += 10;
        } else {
            score = Math.max(0, score - 5);
        }
        
        document.getElementById('score').innerText = score;
        nextCase();
    }

    async function endGame() {
        clearInterval(timer);
        isGameRunning = false;
        alert(`Session Closed! Final Score: ${score}`);
        await saveHighScore(score);
        location.reload();
    }

    async function saveHighScore(finalScore) {
        if (!vaDataRef) return;
        const oldHS = vaDataRef.games_data?.underwriter?.highScore || 0;
        if (finalScore > oldHS) {
            const updatedGames = {
                ...vaDataRef.games_data,
                underwriter: { highScore: finalScore, lastPlayed: new Date() }
            };
            await _supabase.from('va_data').upsert({
                user_id: vaDataRef.user_id,
                games_data: updatedGames,
                updated_at: new Date()
            });
        }
    }

    loadVAData();
</script>

</body>
</html>
