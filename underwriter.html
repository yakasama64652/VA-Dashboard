<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwriter's Ledger - Pixel Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --bg-gray: #e0e0e0;
            --folder-tan: #f3e5ab;
            --belt-gray: #4a4a4a;
            --pixel-font: 'VT323', monospace;
        }

        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: var(--pixel-font);
            color: #333;
        }

        #game-screen {
            width: 800px;
            height: 450px;
            background-color: var(--bg-gray);
            border: 8px solid #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top HUD */
        .hud {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            font-size: 28px;
            line-height: 1;
        }

        /* Buckets */
        .buckets {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: -10px;
        }

        .bucket {
            width: 100px;
            text-align: center;
            transition: transform 0.1s;
        }

        .bucket-img {
            width: 80px;
            height: 80px;
            border: 4px solid #000;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            background: white;
            margin-bottom: 5px;
        }

        .approve .bucket-img { background: #4CAF50; }
        .deny .bucket-img { background: #F44336; }
        .investigate .bucket-img { background: #FFC107; }

        /* Conveyor Belt */
        .conveyor-container {
            position: absolute;
            bottom: 60px;
            width: 100%;
            height: 120px;
            background: var(--belt-gray);
            border-top: 4px solid #000;
            border-bottom: 4px solid #000;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .belt-marks {
            position: absolute;
            width: 200%;
            height: 100%;
            background-image: linear-gradient(90deg, transparent 95%, #000 95%);
            background-size: 50px 100%;
            animation: moveBelt 4s linear infinite;
        }

        @keyframes moveBelt {
            from { transform: translateX(0); }
            to { transform: translateX(-50px); }
        }

        /* The Main Active Folder */
        #active-folder {
            position: absolute;
            left: 50%;
            top: 55%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 180px;
            background: var(--folder-tan);
            border: 4px solid #000;
            padding: 15px;
            z-index: 10;
            cursor: grab;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
        }

        #active-folder::before {
            content: "";
            position: absolute;
            top: -14px;
            left: -4px;
            width: 100px;
            height: 10px;
            background: var(--folder-tan);
            border: 4px solid #000;
            border-bottom: none;
        }

        .folder-text h2 { margin: 0; font-size: 24px; text-decoration: underline; }
        .folder-text p { margin: 5px 0; font-size: 18px; font-weight: bold; }

        /* Background Static Folders */
        .bg-folder {
            width: 120px;
            height: 80px;
            background: #dcdde1;
            border: 2px solid #000;
            margin: 0 40px;
            flex-shrink: 0;
            opacity: 0.6;
        }

        .heart { color: red; font-size: 30px; }
    </style>
</head>
<body>

<div id="game-screen">
    <div class="hud">
        <div>
            SCORE:<br><span id="score">0000</span><br><br>
            LIVES:<br><span id="lives-display">❤️❤️❤️</span><br><br>
            LEVEL:<br><span>1</span>
        </div>
        <div style="text-align: right;">
            <img src="https://cdn-icons-png.flaticon.com/512/1021/1021264.png" width="40" style="filter: grayscale(1);">
        </div>
    </div>

    <div class="buckets">
        <div class="bucket approve" ondrop="drop(event, 'approve')" ondragover="allowDrop(event)">
            <div class="bucket-img">😊</div>
            <span>APPROVE</span>
        </div>
        <div class="bucket deny" ondrop="drop(event, 'deny')" ondragover="allowDrop(event)">
            <div class="bucket-img">🚫</div>
            <span>DENY</span>
        </div>
        <div class="bucket investigate" ondrop="drop(event, 'investigate')" ondragover="allowDrop(event)">
            <div class="bucket-img">🔍</div>
            <span>INVESTIGATE</span>
        </div>
    </div>

    <div class="conveyor-container">
        <div class="belt-marks"></div>
        <div class="bg-folder"></div>
        <div class="bg-folder"></div>
        <div class="bg-folder"></div>
        <div class="bg-folder"></div>
    </div>

    <div id="active-folder" draggable="true" ondragstart="drag(event)">
        <div class="folder-text" id="content">
            </div>
    </div>
</div>

<script>
    let score = 0;
    let lives = 3;

    const data = [
        { title: "JOHN D.", year: 1955, fault: "1 MILE", claims: 3, factor: "LARGE TREE OVER ROOF", ans: "deny" },
        { title: "MARY L.", year: 1990, fault: "50 MILES", claims: 0, factor: "NEW SECURITY SYSTEM", ans: "approve" },
        { title: "CASE #402", year: 2010, fault: "10 MILES", claims: 1, factor: "MISSING ID PHOTO", ans: "investigate" },
        { title: "PETE S.", year: 1940, fault: "5 MILES", claims: 5, factor: "WOOD BURNING STOVE", ans: "deny" },
        { title: "ALEX G.", year: 2022, fault: "100 MILES", claims: 0, factor: "CLEAN RECORD", ans: "approve" }
    ];

    function loadCard() {
        const item = data[Math.floor(Math.random() * data.length)];
        const html = `
            <h2>RISK PROFILE:</h2>
            <p>APPLICANT: ${item.title}</p>
            <p>HOME BUILT: ${item.year}</p>
            <p>DIST. TO FAULT LINE: ${item.fault}</p>
            <p>RECENT CLAIMS: ${item.claims}</p>
            <p>ADDITIONAL FACTOR: ${item.factor}</p>
        `;
        document.getElementById('content').innerHTML = html;
        document.getElementById('active-folder').dataset.answer = item.ans;
    }

    function allowDrop(ev) { ev.preventDefault(); }
    function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }

    function drop(ev, choice) {
        ev.preventDefault();
        const correct = document.getElementById('active-folder').dataset.answer;
        
        if (choice === correct) {
            score += 400;
        } else {
            lives--;
            alert("MISCALCULATED RISK!");
        }

        updateUI();
        if (lives > 0) loadCard();
        else {
            alert("TERMINATED. Final Score: " + score);
            location.reload();
        }
    }

    function updateUI() {
        document.getElementById('score').innerText = score.toString().padStart(4, '0');
        document.getElementById('lives-display').innerText = "❤️".repeat(lives);
    }

    loadCard();
</script>

</body>
</html>
