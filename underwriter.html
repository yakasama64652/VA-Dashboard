<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwriter's Ledger - Fixed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --bg-gray: #d1d1d1;
            --folder-tan: #f3e5ab;
            --belt-gray: #4a4a4a;
            --pixel-font: 'VT323', monospace;
        }

        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: var(--pixel-font);
            overflow: hidden;
        }

        #game-screen {
            width: 800px;
            height: 500px;
            background-color: var(--bg-gray);
            border: 10px solid #000;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* HUD Section */
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 32px;
            line-height: 1.2;
            z-index: 100;
        }

        /* Buckets Section - Fixed Visibility */
        .buckets {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 20px;
            z-index: 100;
        }

        .bucket {
            width: 120px;
            text-align: center;
            cursor: pointer;
        }

        .bucket-img {
            width: 90px;
            height: 90px;
            border: 5px solid #000;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            background: white;
            margin: 0 auto 5px auto;
        }

        .approve .bucket-img { background: #4CAF50; }
        .deny .bucket-img { background: #F44336; }
        .investigate .bucket-img { background: #FFC107; }

        /* Conveyor Belt */
        .conveyor-container {
            position: absolute;
            bottom: 80px;
            width: 100%;
            height: 140px;
            background: var(--belt-gray);
            border-top: 5px solid #000;
            border-bottom: 5px solid #000;
            display: flex;
            align-items: center;
            z-index: 1;
        }

        .belt-marks {
            position: absolute;
            width: 200%;
            height: 100%;
            background-image: linear-gradient(90deg, transparent 95%, #333 95%);
            background-size: 60px 100%;
            animation: moveBelt 3s linear infinite;
        }

        @keyframes moveBelt {
            from { transform: translateX(0); }
            to { transform: translateX(-60px); }
        }

        /* The Draggable Folder - High Z-Index */
        #active-folder {
            position: absolute;
            left: 50%;
            bottom: 100px;
            transform: translateX(-50%);
            width: 300px;
            height: 200px;
            background: var(--folder-tan);
            border: 5px solid #000;
            padding: 20px;
            z-index: 200; /* Ensure it is above everything */
            cursor: grab;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.3);
            user-select: none;
        }

        #active-folder:active { cursor: grabbing; }

        #active-folder::before {
            content: "";
            position: absolute;
            top: -19px;
            left: -5px;
            width: 120px;
            height: 15px;
            background: var(--folder-tan);
            border: 5px solid #000;
            border-bottom: none;
        }

        .folder-text h2 { margin: 0 0 10px 0; font-size: 28px; text-decoration: underline; }
        .folder-text p { margin: 5px 0; font-size: 20px; font-weight: bold; }

        .bg-folder {
            width: 140px;
            height: 90px;
            background: rgba(255,255,255,0.2);
            border: 3px solid #000;
            margin: 0 50px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div id="game-screen">
    <div class="hud">
        SCORE: <span id="score">0000</span><br>
        LIVES: <span id="lives-display">❤️❤️❤️</span><br>
        LEVEL: 1
    </div>

    <div class="buckets">
        <div class="bucket approve" ondrop="drop(event, 'approve')" ondragover="allowDrop(event)">
            <div class="bucket-img">😊</div>
            <span>APPROVE</span>
        </div>
        <div class="bucket investigate" ondrop="drop(event, 'investigate')" ondragover="allowDrop(event)">
            <div class="bucket-img">🔍</div>
            <span>INVESTIGATE</span>
        </div>
        <div class="bucket deny" ondrop="drop(event, 'deny')" ondragover="allowDrop(event)">
            <div class="bucket-img">🚫</div>
            <span>DENY</span>
        </div>
    </div>

    <div class="conveyor-container">
        <div class="belt-marks"></div>
        <div class="bg-folder"></div>
        <div class="bg-folder"></div>
        <div class="bg-folder"></div>
    </div>

    <div id="active-folder" draggable="true" ondragstart="drag(event)">
        <div class="folder-text" id="content">
            </div>
    </div>
</div>

<script>
    let score = 0;
    let lives = 3;

    const scenarios = [
        { title: "ALEX G.", year: 2022, fault: "100 MILES", claims: 0, factor: "CLEAN RECORD", ans: "approve" },
        { title: "JOHN D.", year: 1955, fault: "1 MILE", claims: 3, factor: "LARGE TREE OVER ROOF", ans: "deny" },
        { title: "SARAH P.", year: 2010, fault: "20 MILES", claims: 1, factor: "MISSING SIGNATURE", ans: "investigate" },
        { title: "MIKE R.", year: 1985, fault: "5 MILES", claims: 4, factor: "STUNT DRIVER", ans: "deny" },
        { title: "TECH CORP", year: 2024, fault: "N/A", claims: 0, factor: "NEW VENTURE", ans: "investigate" }
    ];

    function loadCard() {
        const item = scenarios[Math.floor(Math.random() * scenarios.length)];
        const html = `
            <h2>RISK PROFILE:</h2>
            <p>APPLICANT: ${item.title}</p>
            <p>HOME BUILT: ${item.year}</p>
            <p>DIST. TO FAULT LINE: ${item.fault}</p>
            <p>RECENT CLAIMS: ${item.claims}</p>
            <p>ADDITIONAL FACTOR: ${item.factor}</p>
        `;
        document.getElementById('content').innerHTML = html;
        document.getElementById('active-folder').dataset.answer = item.ans;
        
        // Reset position in case of glitches
        const folder = document.getElementById('active-folder');
        folder.style.left = "50%";
        folder.style.bottom = "100px";
    }

    function allowDrop(ev) {
        ev.preventDefault();
    }

    function drag(ev) {
        ev.dataTransfer.setData("text", ev.target.id);
    }

    function drop(ev, choice) {
        ev.preventDefault();
        const folder = document.getElementById('active-folder');
        const correctAnswer = folder.dataset.answer;

        if (choice === correctAnswer) {
            score += 100;
        } else {
            lives--;
            alert("WRONG ASSESSMENT!");
        }

        updateUI();
        if (lives > 0) {
            loadCard();
        } else {
            alert("GAME OVER! Score: " + score);
            score = 0; lives = 3;
            updateUI();
            loadCard();
        }
    }

    function updateUI() {
        document.getElementById('score').innerText = score.toString().padStart(4, '0');
        document.getElementById('lives-display').innerText = "❤️".repeat(lives);
    }

    // Initial Start
    loadCard();
</script>

</body>
</html>
