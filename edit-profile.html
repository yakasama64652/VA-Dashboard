<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | VA Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --dark: #1e293b; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 600px; margin: 40px auto; background: var(--white); padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: var(--dark); border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: #64748b; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 1rem; transition: 0.3s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        .photo-preview-container { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; background: #f8fafc; padding: 15px; border-radius: 15px; }
        #preview-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--white); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        .btn { flex: 1; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; transition: 0.3s; text-align: center; text-decoration: none; }
        .btn-save { background: var(--primary); color: white; }
        .btn-save:hover { background: #1d4ed8; }
        .btn-cancel { background: #e2e8f0; color: #475569; }
        .btn-cancel:hover { background: #cbd5e1; }
        
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader">Saving...</div>

<div class="container">
    <h2>Update VA Profile</h2>
    
    <div class="photo-preview-container">
        <img id="preview-img" src="https://via.placeholder.com/100?text=VA" alt="Preview">
        <div>
            <label>Profile Photo</label>
            <input type="file" id="file-input" accept="image/*" onchange="previewPhoto(event)">
        </div>
    </div>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="va-name" placeholder="Enter your full name">
    </div>

    <div style="display: flex; gap: 20px;">
        <div class="form-group" style="flex: 1;">
            <label>Gender</label>
            <select id="va-gender">
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Non-binary">Non-binary</option>
                <option value="Prefer not to say">Prefer not to say</option>
            </select>
        </div>
        <div class="form-group" style="flex: 1;">
            <label>Birthday</label>
            <input type="date" id="va-birthday">
        </div>
    </div>

    <div class="form-group">
        <label>VA Role</label>
        <input type="text" id="va-role" placeholder="e.g. Executive Assistant, Social Media Manager">
    </div>

    <div class="form-group">
        <label>Agency Name</label>
        <input type="text" id="va-agency" placeholder="Enter Agency Name">
    </div>

    <div class="form-group">
        <label>Date of Joining the Agency</label>
        <input type="date" id="va-join-date">
    </div>

    <div class="btn-group">
        <a href="index.html" class="btn btn-cancel">Cancel</a>
        <button class="btn btn-save" onclick="saveProfile()">Save Changes</button>
    </div>
</div>

<script>
    // --- 1. CONFIG (Matches your Dashboard) ---
    const _supabase = supabase.createClient('https://esjxzcmfxtestkettdyp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzanh6Y21meHRlc3RrZXR0ZHlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNTQ3MzksImV4cCI6MjA5MzczMDczOX0.G9i7nrGVzD8WrKFg7642HvRs9GeTPgkRMuFw8vQ-6C0');
    let currentUser = null;
    let currentPhotoBase64 = "";

    // --- 2. INITIALIZE ---
    async function init() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            window.location.href = "index.html"; // Redirect if not logged in
            return;
        }
        currentUser = session.user;
        loadExistingData();
    }

    async function loadExistingData() {
        const { data: dbData } = await _supabase
            .from('va_data')
            .select('*')
            .eq('user_id', currentUser.id)
            .single();

        if (dbData && dbData.profile_data) {
            const p = dbData.profile_data;
            document.getElementById('va-name').value = p.name || "";
            document.getElementById('va-gender').value = p.gender || "";
            document.getElementById('va-birthday').value = p.birthday || "";
            document.getElementById('va-role').value = p.role || "";
            document.getElementById('va-agency').value = p.agency || "";
            document.getElementById('va-join-date').value = p.joinDate || "";
            if (p.photo) {
                document.getElementById('preview-img').src = p.photo;
                currentPhotoBase64 = p.photo;
            }
        }
    }

    // --- 3. PHOTO HANDLING ---
    function previewPhoto(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            currentPhotoBase64 = e.target.result;
            document.getElementById('preview-img').src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // --- 4. SAVE TO CLOUD ---
    async function saveProfile() {
        document.getElementById('loader').style.display = 'flex';

        const updatedProfile = {
            name: document.getElementById('va-name').value,
            gender: document.getElementById('va-gender').value,
            birthday: document.getElementById('va-birthday').value,
            role: document.getElementById('va-role').value,
            agency: document.getElementById('va-agency').value,
            joinDate: document.getElementById('va-join-date').value,
            photo: currentPhotoBase64
        };

        const { error } = await _supabase
            .from('va_data')
            .upsert({ 
                user_id: currentUser.id, 
                profile_data: updatedProfile,
                updated_at: new Date()
            }, { onConflict: 'user_id' });

        document.getElementById('loader').style.display = 'none';

        if (error) {
            alert("Error saving: " + error.message);
        } else {
            alert("Profile updated successfully!");
            window.location.href = "index.html"; // Go back to dashboard
        }
    }

    init();
</script>

</body>
</html>
