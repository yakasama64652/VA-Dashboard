<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE INSURANCE HANGMAN</title>
    <!-- Retro Arcade Font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-green: #39ff14;
            --pixel-dark: #0a0a12;
            --pixel-pink: #ff007f;
            --pixel-blue: #00f0ff;
            --pixel-yellow: #ffec27;
        }

        * {
            box-sizing: border-box;
            font-family: 'Press Start 2P', monospace;
            image-rendering: pixelated;
        }

        body {
            background-color: var(--pixel-dark);
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop'); /* Cyber grid illusion */
            background-size: cover;
            background-position: center;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            padding: 20px;
        }

        /* CRT Screen Scanline Overlay Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Arcade Cabinet Frame */
        .arcade-container {
            background: #1c1c3a;
            border: 8px solid #3a3a78;
            box-shadow: 0 0 0 8px #000, 0 20px 0 #000, 0 0 30px rgba(0,240,255,0.4);
            border-radius: 4px;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .arcade-header {
            background: linear-gradient(180deg, var(--pixel-pink) 0%, #b30059 100%);
            border: 4px solid #fff;
            padding: 15px 10px;
            margin-bottom: 25px;
            box-shadow: 0 6px 0 #000;
            transform: skewX(-4deg);
        }

        .arcade-header h1 {
            margin: 0;
            font-size: 18px;
            color: #fff;
            text-shadow: 3px 3px 0px #000;
            letter-spacing: 2px;
            animation: blink 1.5s infinite;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: #000;
            border: 4px solid var(--pixel-blue);
            padding: 10px;
            margin-bottom: 20px;
            font-size: 10px;
            color: var(--pixel-yellow);
        }

        /* Screen Area */
        .game-screen {
            background-color: #050510;
            border: 6px solid #222;
            border-radius: 10px;
            padding: 20px;
            box-shadow: inset 0 0 20px rgba(57, 255, 20, 0.3);
            margin-bottom: 20px;
        }

        /* Custom Pixel Art Canvas instead of basic shapes */
        .gallows-container {
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        /* Custom Pure CSS Pixel Art Sprite for Statuses */
        .pixel-sprite {
            width: 64px;
            height: 64px;
            background-size: contain;
            background-repeat: no-repeat;
            image-rendering: pixelated;
            transition: transform 0.3s ease;
        }

        /* Dynamic hint styling */
        .hint-box {
            font-size: 10px;
            line-height: 1.6;
            color: var(--pixel-blue);
            min-height: 50px;
            border-bottom: 2px dashed #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* Hidden Word Display */
        .word-display {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            min-height: 40px;
        }

        .letter-space {
            border-bottom: 5px solid var(--pixel-green);
            width: 24px;
            font-size: 18px;
            text-align: center;
            color: #fff;
            text-shadow: 2px 2px 0px #000;
            height: 30px;
        }

        .letter-space.guessed {
            border-bottom: 5px solid transparent;
            color: var(--pixel-yellow);
            animation: bounce 0.2s ease-in-out;
        }

        /* Arcade Keyboard / Controls */
        .keyboard {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            background: #25254d;
            padding: 15px;
            border: 4px solid #000;
            box-shadow: inset 0 4px 0 rgba(255,255,255,0.2);
        }

        @media (max-width: 600px) {
            .keyboard { grid-template-columns: repeat(5, 1fr); }
            .arcade-header h1 { font-size: 12px; }
        }

        .key-btn {
            background: linear-gradient(180deg, #444 0%, #222 100%);
            border: 3px solid #000;
            border-bottom: 6px solid #000;
            color: #fff;
            padding: 10px 0;
            font-size: 11px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.05s ease;
        }

        .key-btn:active:not(:disabled) {
            border-bottom-width: 3px;
            transform: translateY(3px);
        }

        .key-btn:disabled {
            background: #111;
            border-color: #222;
            color: #444;
            cursor: not-allowed;
        }

        .key-btn.correct {
            background: linear-gradient(180deg, var(--pixel-green) 0%, #229900 100%);
            color: #000;
        }

        .key-btn.wrong {
            background: linear-gradient(180deg, var(--pixel-pink) 0%, #99004c 100%);
            color: #fff;
        }

        /* Modal Alerts */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #111;
            border: 6px solid var(--pixel-yellow);
            max-width: 500px;
            width: 100%;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 20px var(--pixel-yellow);
        }

        .modal-title {
            font-size: 20px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #000;
        }

        .win-title { color: var(--pixel-green); }
        .lose-title { color: var(--pixel-pink); }

        .modal-body {
            font-size: 10px;
            line-height: 1.8;
            margin-bottom: 25px;
            color: #bbb;
        }

        .action-btn {
            background: linear-gradient(180deg, var(--pixel-yellow) 0%, #b39b00 100%);
            border: 4px solid #000;
            border-bottom: 8px solid #000;
            color: #000;
            padding: 12px 20px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .action-btn:active {
            border-bottom-width: 4px;
            transform: translateY(4px);
        }

        /* Animations */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <div class="arcade-container">
        <div class="arcade-header">
            <h1>INSURANCE GLOSSARY HERO</h1>
        </div>

        <div class="stats-bar">
            <div>SCORE:<span id="score-val">0000</span></div>
            <div>LIVES:<span id="lives-val">🤖🤖🤖🤖🤖🤖</span></div>
        </div>

        <div class="game-screen">
            <!-- Custom Pixel Art State Displays via Dynamic SVG URLs -->
            <div class="gallows-container">
                <img id="status-sprite" class="pixel-sprite" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=happy&backgroundColor=transparent" alt="Status Mascot">
            </div>

            <div id="hint-text" class="hint-box">
                LOADING HINT...
            </div>

            <div id="word-container" class="word-display">
                <!-- Spaces generated by JS -->
            </div>
        </div>

        <div class="keyboard" id="keyboard-container">
            <!-- Keys generated by JS -->
        </div>
    </div>

    <!-- Retro End Game Popups -->
    <div class="modal" id="game-modal">
        <div class="modal-content" id="modal-content-box">
            <div id="modal-status" class="modal-title">SYSTEM ERROR</div>
            <div id="modal-details" class="modal-body">Details go here.</div>
            <button class="action-btn" onclick="startNewGame()">NEXT LEVEL</button>
        </div>
    </div>

    <script>
        // Comprehensive US Insurance Glossary Data Set
        const glossary = [
            {
                word: "DEDUCTIBLE",
                hint: "The specific out-of-pocket amount a policyholder must pay before their insurance company begins paying for covered losses."
            },
            {
                word: "SUBROGATION",
                hint: "The process where an insurance company pursues a third party that caused an insurance loss to the insured in order to recover compensation."
            },
            {
                word: "COINSURANCE",
                hint: "The percentage of medical costs the insured pays after meeting their deductible (e.g., an 80/20 split)."
            },
            {
                word: "PREMIUM",
                hint: "The regular amount of money an individual or business must pay to an insurance company to keep a policy active."
            },
            {
                word: "ENDORSEMENT",
                hint: "An amendment or addition added to an existing insurance contract that changes its original terms or scope of coverage."
            },
            {
                word: "UNDERWRITER",
                hint: "The professional who assesses risks, determines acceptability, and establishes pricing/premiums for insurance applicants."
            },
            {
                word: "LIABILITY",
                hint: "Legal responsibility for damage, injury, or loss caused to another person or their property."
            },
            {
                word: "EXCLUSION",
                hint: "Specific hazards, perils, or conditions listed explicitly in an insurance policy for which the insurer will NOT provide coverage."
            },
            {
                word: "ACTUARY",
                hint: "A highly specialized statistician who uses mathematical models to analyze probabilities of risk and forecast financial consequences."
            },
            {
                word: "BENEFIClARY",
                hint: "The person or legal entity designated in a policy (commonly life insurance) to receive payout benefits upon a valid claim trigger."
            },
            {
                word: "COPAYMENT",
                hint: "A fixed, flat dollar fee that an insured person pays at the exact moment a specific medical service or prescription is rendered."
            },
            {
                word: "HIPAA",
                hint: "The 1996 US Federal legislation safeguarding sensitive patient health data from being disclosed without consent or knowledge."
            }
        ];

        // Unique dynamic pixel sprite links to reflect status changes without basic vector elements
        const sprites = {
            6: "https://api.dicebear.com/7.x/pixel-art/svg?seed=happy&backgroundColor=transparent&flip=false", // Full Health
            5: "https://api.dicebear.com/7.x/pixel-art/svg?seed=smile&backgroundColor=transparent",
            4: "https://api.dicebear.com/7.x/pixel-art/svg?seed=neutral&backgroundColor=transparent",
            3: "https://api.dicebear.com/7.x/pixel-art/svg?seed=sad&backgroundColor=transparent",
            2: "https://api.dicebear.com/7.x/pixel-art/svg?seed=confused&backgroundColor=transparent",
            1: "https://api.dicebear.com/7.x/pixel-art/svg?seed=scared&backgroundColor=transparent", // Critical Danger
            0: "https://api.dicebear.com/7.x/pixel-art/svg?seed=dead&backgroundColor=transparent"   // Game Over
        };

        let currentWordObj;
        let selectedWord = "";
        let guessedLetters = [];
        let maxLives = 6;
        let remainingLives = maxLives;
        let runningScore = 0;

        // Initialize keyboard keys dynamically
        function setupKeyboard() {
            const kbContainer = document.getElementById("keyboard-container");
            kbContainer.innerHTML = "";
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            
            letters.forEach(letter => {
                const button = document.createElement("button");
                button.textContent = letter;
                button.classList.add("key-btn");
                button.setAttribute("id", `key-${letter}`);
                button.addEventListener("click", () => handleGuess(letter));
                kbContainer.appendChild(button);
            });
        }

        // Start/Restart Core Setup
        function startNewGame() {
            // Close modal
            document.getElementById("game-modal").style.display = "none";
            
            // Pick a word randomly
            currentWordObj = glossary[Math.floor(Math.random() * glossary.length)];
            selectedWord = currentWordObj.word.toUpperCase();
            guessedLetters = [];
            remainingLives = maxLives;

            // Render stats and updates
            updateStatsDisplay();
            document.getElementById("hint-text").innerHTML = `MISSION DEFINITION:<br>${currentWordObj.hint}`;
            document.getElementById("status-sprite").src = sprites[remainingLives];

            // Setup word blanks
            const wordContainer = document.getElementById("word-container");
            wordContainer.innerHTML = "";
            for (let i = 0; i < selectedWord.length; i++) {
                const space = document.createElement("div");
                space.classList.add("letter-space");
                space.setAttribute("id", `space-${i}`);
                wordContainer.appendChild(space);
            }

            setupKeyboard();
        }

        function updateStatsDisplay() {
            document.getElementById("score-val").textContent = String(runningScore).padStart(4, '0');
            
            // Build custom pixel heart system indicators
            let livesIcons = "";
            for (let i = 0; i < maxLives; i++) {
                livesIcons += (i < remainingLives) ? "❤️" : "💀";
            }
            document.getElementById("lives-val").textContent = livesIcons;
        }

        // Process user inputs
        function handleGuess(letter) {
            if (guessedLetters.includes(letter) || remainingLives <= 0) return;

            guessedLetters.push(letter);
            const keyBtn = document.getElementById(`key-${letter}`);
            keyBtn.disabled = true;

            if (selectedWord.includes(letter)) {
                keyBtn.classList.add("correct");
                revealCorrectLetters();
                checkWinCondition();
            } else {
                keyBtn.classList.add("wrong");
                remainingLives--;
                document.getElementById("status-sprite").src = sprites[remainingLives];
                updateStatsDisplay();
                checkLoseCondition();
            }
        }

        function revealCorrectLetters() {
            for (let i = 0; i < selectedWord.length; i++) {
                if (selectedWord[i] === selectedWord[i]) {
                    if (guessedLetters.includes(selectedWord[i])) {
                        const space = document.getElementById(`space-${i}`);
                        space.textContent = selectedWord[i];
                        space.classList.add("guessed");
                    }
                }
            }
        }

        function checkWinCondition() {
            const allGuessed = selectedWord.split("").every(letter => guessedLetters.includes(letter));
            if (allGuessed) {
                runningScore += 100;
                updateStatsDisplay();
                showEndModal(true);
            }
        }

        function checkLoseCondition() {
            if (remainingLives <= 0) {
                showEndModal(false);
            }
        }

        function showEndModal(isWin) {
            const modal = document.getElementById("game-modal");
            const box = document.getElementById("modal-content-box");
            const title = document.getElementById("modal-status");
            const details = document.getElementById("modal-details");

            modal.style.display = "flex";

            if (isWin) {
                box.style.borderColor = "var(--pixel-green)";
                box.style.boxShadow = "0 0 20px var(--pixel-green)";
                title.textContent = "STAGE CLEAR";
                title.className = "modal-title win-title";
                details.innerHTML = `EXCELLENT WORK VA!<br><br>You correctly logged <b style="color:var(--pixel-yellow)">${selectedWord}</b>.<br>+100 Core Data Points acquired.`;
            } else {
                box.style.borderColor = "var(--pixel-pink)";
                box.style.boxShadow = "0 0 20px var(--pixel-pink)";
                title.textContent = "GAME OVER";
                title.className = "modal-title lose-title";
                details.innerHTML = `TRANSMISSION FAILURE!<br><br>The correct insurance standard was:<br><b style="color:var(--pixel-blue)">${selectedWord}</b>.<br><br>Review the hint provided and refresh your parameters.`;
            }
        }

        // Support physical desktop keyboard typing entries
        document.addEventListener("keydown", (e) => {
            const key = e.key.toUpperCase();
            if (key.match(/^[A-Z]$/)) {
                const targetBtn = document.getElementById(`key-${key}`);
                if (targetBtn && !targetBtn.disabled && document.getElementById("game-modal").style.display !== "flex") {
                    handleGuess(key);
                }
            }
        });

        // Initialize execution setup on load
        window.onload = startNewGame;
    </script>
</body>
</html>
