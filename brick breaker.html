<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAVA Games | Brick Breaker Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .ui { margin-bottom: 20px; text-align: center; }
        p { color: #94a3b8; font-size: 0.9rem; margin: 0; }
        
        #game-container { position: relative; width: 800px; height: 600px; }
        canvas { background: #1e293b; display: block; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); border: 4px solid #ef4444; width: 100%; height: 100%; }

        /* Menu Overlay */
        #menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        
        /* Logo Styling */
        .menu-logo { max-width: 180px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.3)); }
        
        .menu-title { font-size: 2.5rem; color: #ef4444; margin-bottom: 30px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 15px rgba(239,68,68,0.5); }
        .menu-btns { display: flex; flex-direction: column; gap: 15px; width: 300px; }
        .btn-menu { background: #ef4444; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: 600; text-transform: uppercase; transition: 0.2s; }
        .btn-menu:hover { background: #dc2626; transform: translateY(-2px); }
        .high-score-tag { margin-top: 20px; color: #10b981; font-weight: bold; }

        /* Leaderboard Modal */
        #leaderboard-modal { display: none; position: absolute; top: 50px; left: 50%; transform: translateX(-50%); width: 600px; background: #1e293b; padding: 30px; border-radius: 16px; border: 2px solid #ef4444; z-index: 20; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        #leaderboard-modal h2 { color: #10b981; text-align: center; margin-top: 0; }
        .leaderboard-list { margin-top: 20px; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }
        .leaderboard-item:last-child { border-bottom: none; }
        .leaderboard-name { color: white; font-weight: 600; }
        .leaderboard-score { color: #ef4444; }
        .btn-close-modal { position: absolute; top: 15px; right: 15px; background: transparent; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="ui">
    <p>Use Arrow Keys to Move | Esc to Pause</p>
</div>

<div id="game-container">
    <div id="menu-overlay">
        <img src="kling_20260422_VIDEO__1217_0.png" alt="LAVA Logo" class="menu-logo">
        <div class="menu-title">LAVA BRICK BREAKER</div>
        <div class="menu-btns">
            <button class="btn-menu" onclick="startGame()">Start New Game</button>
            <button class="btn-menu" style="background: #10b981;" onclick="showLeaderboard()">Leaderboard</button>
        </div>
        <div class="high-score-tag" id="main-high-score">Your High Score: Loading...</div>
    </div>

    <div id="leaderboard-modal">
        <button class="btn-close-modal" onclick="closeLeaderboard()">✕</button>
        <h2>TOP BRICK COMMANDERS</h2>
        <div id="leaderboard-content" class="leaderboard-list">
            Loading...
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<script>
    // --- SUPABASE CONFIGURATION ---
    const _supabaseUrl = 'https://esjxzcmfxtestkettdyp.supabase.co';
    const _supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzanh6Y21meHRlc3RrZXR0ZHlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNTQ3MzksImV4cCI6MjA5MzczMDczOX0.G9i7nrGVzD8WrKFg7642HvRs9GeTPgkRMuFw8vQ-6C0';
    const _supabase = supabase.createClient(_supabaseUrl, _supabaseKey);

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- LOAD PADDLE IMAGE ---
    const paddleImage = new Image();
    paddleImage.src = 'paddleRed.png';
    let paddleLoaded = false;
    paddleImage.onload = () => { paddleLoaded = true; };

    // Game State
    let score = 0;
    let totalScore = 0;
    let lives = 3;
    let level = 1;
    let isGameRunning = false;
    let maxLevels = 3;
    let vaDataRef = null;

    // Ball properties
    let ballRadius = 10;
    let x = canvas.width / 2;
    let y = canvas.height - 40;
    let baseDx = 4;
    let baseDy = -4;
    let dx = baseDx;
    let dy = baseDy;

    // Paddle properties
    const paddleHeight = 16;
    const paddleWidth = 120;
    let paddleX = (canvas.width - paddleWidth) / 2;

    // Controls
    let rightPressed = false;
    let leftPressed = false;

    // Bricks Config
    let brickRowCount = 0;
    let brickColumnCount = 0;
    let brickWidth = 0;
    let brickHeight = 25;
    let brickPadding = 12;
    let brickOffsetTop = 60;
    let brickOffsetLeft = 0; 
    let bricks = [];

    function initLevel(lvl) {
        level = lvl;
        score = 0; 
        bricks = [];
        x = canvas.width / 2;
        y = canvas.height - 40;
        dx = baseDx + (level * 0.5);
        dy = baseDy - (level * 0.5);
        paddleX = (canvas.width - paddleWidth) / 2;

        if (level === 1) {
            brickRowCount = 4;
            brickColumnCount = 8;
            brickWidth = 80;
            brickOffsetLeft = (canvas.width - (brickColumnCount * (brickWidth + brickPadding))) / 2;
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        } else if (level === 2) {
            brickColumnCount = 11;
            brickWidth = 60;
            brickPadding = 8;
            brickOffsetLeft = (canvas.width - (brickColumnCount * (brickWidth + brickPadding))) / 2;
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                const midpoint = Math.floor(brickColumnCount / 2);
                const count = midpoint + 1 - Math.abs(midpoint - c);
                for (let r = 0; r < count; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        } else if (level === 3) {
            brickColumnCount = 11;
            brickRowCount = 7;
            brickWidth = 60;
            brickPadding = 8;
            brickOffsetLeft = (canvas.width - (brickColumnCount * (brickWidth + brickPadding))) / 2;
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    const midpointC = Math.floor(brickColumnCount / 2);
                    const midpointR = Math.floor(brickRowCount / 2);
                    if (c === midpointC || r === midpointR) {
                        bricks[c][r] = { x: 0, y: 0, status: 1 };
                    } else {
                        bricks[c][r] = { x: 0, y: 0, status: 0 };
                    }
                }
            }
        }
    }

    // --- KEYBOARD CONTROLS ONLY ---
    document.addEventListener("keydown", keyDownHandler, false);
    document.addEventListener("keyup", keyUpHandler, false);

    function keyDownHandler(e) {
        if (e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
        else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
        else if (e.key === "Esc" || e.key === "Escape") toggleMenu();
    }

    function keyUpHandler(e) {
        if (e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
        else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
    }

    function toggleMenu() {
        if (!isGameRunning) return; 
        const overlay = document.getElementById('menu-overlay');
        overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
    }

    function startGame() {
        document.getElementById('menu-overlay').style.display = 'none';
        isGameRunning = true;
        totalScore = 0;
        score = 0;
        lives = 3;
        initLevel(1);
        draw(); 
    }

    function countActiveBricks() {
        let count = 0;
        for (let c = 0; c < bricks.length; c++) {
            if (!bricks[c]) continue;
            for (let r = 0; r < bricks[c].length; r++) {
                if (bricks[c][r] && bricks[c][r].status === 1) count++;
            }
        }
        return count;
    }

    function collisionDetection() {
        for (let c = 0; c < bricks.length; c++) {
            if (!bricks[c]) continue;
            for (let r = 0; r < bricks[c].length; r++) {
                const b = bricks[c][r];
                if (b && b.status === 1) {
                    if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                        dy = -dy;
                        b.status = 0;
                        score++;
                        totalScore++;
                        if (countActiveBricks() === 0) {
                            if (level < maxLevels) {
                                alert(`LEVEL ${level} COMPLETE! Preparing Level ${level + 1}...`);
                                initLevel(level + 1);
                            } else {
                                handleGameWin();
                            }
                        }
                    }
                }
            }
        }
    }

    function drawBall() {
        ctx.beginPath();
        ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
        ctx.fillStyle = "#10b981";
        ctx.fill();
        ctx.closePath();
    }

    function drawPaddle() {
        if (paddleLoaded) {
            ctx.drawImage(paddleImage, paddleX, canvas.height - paddleHeight - 5, paddleWidth, paddleHeight);
        } else {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - paddleHeight - 5, paddleWidth, paddleHeight);
            ctx.fillStyle = "#ef4444"; 
            ctx.fill();
            ctx.closePath();
        }
    }

    function drawBricks() {
        for (let c = 0; c < bricks.length; c++) {
            if (!bricks[c]) continue;
            for (let r = 0; r < bricks[c].length; r++) {
                if (bricks[c][r] && bricks[c][r].status === 1) {
                    const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                    const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                    bricks[c][r].x = brickX;
                    bricks[c][r].y = brickY;
                    ctx.beginPath();
                    ctx.rect(brickX, brickY, brickWidth, brickHeight);
                    if (level === 1) ctx.fillStyle = "#3b82f6";
                    else if (level === 2) ctx.fillStyle = "#10b981";
                    else ctx.fillStyle = "#ef4444";
                    ctx.fill();
                    ctx.closePath();
                }
            }
        }
    }

    function drawScore() {
        ctx.font = "bold 18px Inter";
        ctx.fillStyle = "#ffffff";
        ctx.fillText("Score: " + totalScore, 15, 30);
    }

    function drawLevel() {
        ctx.font = "bold 18px Inter";
        ctx.fillStyle = "#ffffff";
        ctx.fillText("Level: " + level, canvas.width / 2 - 40, 30);
    }

    function drawLives() {
        ctx.font = "bold 18px Inter";
        ctx.fillStyle = "#ffffff";
        ctx.fillText("Lives: " + lives, canvas.width - 90, 30);
    }

    function draw() {
        if (!isGameRunning) return;
        const overlay = document.getElementById('menu-overlay');
        if (overlay.style.display === 'flex') {
            requestAnimationFrame(draw); 
            return;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBricks();
        drawBall();
        drawPaddle();
        drawScore();
        drawLevel();
        drawLives();
        collisionDetection();

        if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
        if (y + dy < ballRadius) dy = -dy;
        else if (y + dy > canvas.height - ballRadius - 5) {
            if (x > paddleX && x < paddleX + paddleWidth && y + dy > canvas.height - paddleHeight - ballRadius - 5) {
                dy = -dy;
                dx = dx + ( (x - (paddleX + paddleWidth/2)) / (paddleWidth/2) );
                if(dx > 6) dx = 6;
                if(dx < -6) dx = -6;
            } else if(y + dy > canvas.height - ballRadius) {
                lives--;
                if (!lives) {
                    handleGameOver();
                } else {
                    x = canvas.width / 2;
                    y = canvas.height - 40;
                    dx = baseDx + (level * 0.5); 
                    dy = baseDy - (level * 0.5);
                    paddleX = (canvas.width - paddleWidth) / 2;
                }
            }
        }

        // MOVEMENT LOGIC: Arrows only
        if (rightPressed && paddleX < canvas.width - paddleWidth) paddleX += 9;
        else if (leftPressed && paddleX > 0) paddleX -= 9;

        x += dx;
        y += dy;
        requestAnimationFrame(draw);
    }

    function handleGameOver() {
        isGameRunning = false;
        saveHighScore(totalScore); 
        alert("GAME OVER! Your Score: " + totalScore);
        location.reload(); 
    }

    function handleGameWin() {
        isGameRunning = false;
        totalScore += 100;
        saveHighScore(totalScore); 
        alert("CONGRATULATIONS COMMANDER! YOU DESTROYED ALL LEVELS! Final Score: " + totalScore);
        location.reload();
    }

    async function loadVAData() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) return;
        const vaUser = session.user;
        const { data, error } = await _supabase.from('va_data').select('*').eq('user_id', vaUser.id).single();
        if (data) {
            vaDataRef = data;
            const highScore = data.games_data?.brickBreaker?.highScore || 0;
            document.getElementById('main-high-score').innerText = `Your High Score: ${highScore}`;
        }
    }

    async function saveHighScore(currentScore) {
        if (!vaDataRef || !vaDataRef.user_id) return;
        const oldHighScore = vaDataRef.games_data?.brickBreaker?.highScore || 0;
        if (currentScore > oldHighScore) {
            const updatedGamesData = {
                ...vaDataRef.games_data,
                brickBreaker: { highScore: currentScore, lastPlayed: new Date() }
            };
            await _supabase.from('va_data').upsert({
                user_id: vaDataRef.user_id,
                games_data: updatedGamesData,
                updated_at: new Date()
            }, { onConflict: 'user_id' });
            document.getElementById('main-high-score').innerText = `Your High Score: ${currentScore} (New!)`;
        }
    }

    async function showLeaderboard() {
        const modal = document.getElementById('leaderboard-modal');
        const content = document.getElementById('leaderboard-content');
        modal.style.display = 'block';
        content.innerHTML = 'Loading Top VAs...';
        const { data, error } = await _supabase.from('va_data').select('profile_data, games_data').not('games_data', 'is', null);
        if (error) { content.innerHTML = 'Error loading scores.'; return; }

        const leaderboard = data
            .filter(va => va.games_data?.brickBreaker?.highScore) 
            .map(va => ({ name: va.profile_data.name || 'Unknown VA', score: va.games_data.brickBreaker.highScore }))
            .sort((a, b) => b.score - a.score) 
            .slice(0, 10); 

        if (leaderboard.length === 0) { content.innerHTML = 'No scores recorded yet!'; } 
        else {
            content.innerHTML = leaderboard.map((entry, index) => `
                <div class="leaderboard-item">
                    <span class="leaderboard-name">${index + 1}. ${entry.name}</span>
                    <span class="leaderboard-score">${entry.score} pts</span>
                </div>
            `).join('');
        }
    }

    function closeLeaderboard() { document.getElementById('leaderboard-modal').style.display = 'none'; }
    loadVAData();
</script>
</body>
</html>
